<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加班管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .employee-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .employee-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .employee-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        .employee-card.empty {
            background: rgba(255,255,255,0.1);
            border: 2px dashed rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }

        .employee-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
        }

        .employee-info {
            margin-bottom: 10px;
        }

        .info-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
        }

        .info-value.good {
            color: #10b981;
        }

        .info-value.warning {
            color: #ef4444;
        }

        .info-value.zero {
            color: #999;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }

        .modal-header {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-label input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .modal-actions .btn {
            flex: 1;
        }

        .ot-record {
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .ot-record.expired {
            border-left-color: #ef4444;
            opacity: 0.7;
        }

        .ot-record.expiring-soon {
            border-left-color: #f59e0b;
        }

        .ot-record-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .ot-record-date {
            font-weight: 600;
            color: #333;
        }

        .ot-record-status {
            font-size: 0.9em;
            padding: 4px 12px;
            border-radius: 12px;
            background: #e5e7eb;
            color: #666;
        }

        .ot-record-status.valid {
            background: #d1fae5;
            color: #065f46;
        }

        .ot-record-status.expired {
            background: #fee2e2;
            color: #991b1b;
        }

        .ot-record-status.expiring {
            background: #fef3c7;
            color: #92400e;
        }

        .ot-record-info {
            font-size: 0.9em;
            color: #666;
        }

        .no-records {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .employee-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 加班管理系统</h1>
            <p>轻松管理团队加班与调休</p>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="openAddEmployeeModal()">👤 人员录入</button>
            <button class="btn btn-primary" onclick="openAddOTModal()">➕ 加班录入</button>
            <button class="btn btn-primary" onclick="openLeaveModal()">🏖️ 调休申请</button>
            <button class="btn btn-success" onclick="refreshData()">🔄 刷新数据</button>
            <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清空数据</button>
        </div>

        <div class="employee-grid" id="employeeGrid">
            <!-- 员工卡片将动态生成 -->
        </div>
    </div>

    <!-- 人员录入弹窗 -->
    <div class="modal" id="addEmployeeModal">
        <div class="modal-content">
            <div class="modal-header">👤 添加员工</div>
            <div class="form-group">
                <label class="form-label">员工姓名</label>
                <input type="text" class="form-input" id="employeeName" placeholder="请输入员工姓名">
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="addEmployee()">确认添加</button>
                <button class="btn" style="background: #e5e7eb;" onclick="closeModal('addEmployeeModal')">取消</button>
            </div>
        </div>
    </div>

    <!-- 加班录入弹窗 -->
    <div class="modal" id="addOTModal">
        <div class="modal-content">
            <div class="modal-header">➕ 加班录入</div>
            <div class="form-group">
                <label class="form-label">选择员工</label>
                <select class="form-input" id="otEmployee">
                    <option value="">请选择员工</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">加班日期</label>
                <input type="date" class="form-input" id="otDate">
            </div>
            <div class="form-group">
                <label class="form-label">加班时长</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="otAM">
                        上半天 (0.5天)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="otPM">
                        下半天 (0.5天)
                    </label>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="addOT()">确认录入</button>
                <button class="btn" style="background: #e5e7eb;" onclick="closeModal('addOTModal')">取消</button>
            </div>
        </div>
    </div>

    <!-- 调休申请弹窗 -->
    <div class="modal" id="leaveModal">
        <div class="modal-content">
            <div class="modal-header">🏖️ 调休申请</div>
            <div class="form-group">
                <label class="form-label">选择员工</label>
                <select class="form-input" id="leaveEmployee" onchange="loadEmployeeOTRecords()">
                    <option value="">请选择员工</option>
                </select>
            </div>
            <div id="otRecordsList"></div>
            <div class="form-group">
                <label class="form-label">调休日期</label>
                <input type="date" class="form-input" id="leaveDate">
            </div>
            <div class="form-group">
                <label class="form-label">调休时长</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="leaveAM">
                        上半天 (0.5天)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="leavePM">
                        下半天 (0.5天)
                    </label>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="applyLeave()">确认申请</button>
                <button class="btn" style="background: #e5e7eb;" onclick="closeModal('leaveModal')">取消</button>
            </div>
        </div>
    </div>

    <script>
        // 数据存储键名
        const STORAGE_KEYS = {
            EMPLOYEES: 'ot_employees',
            OT_RECORDS: 'ot_records',
            LEAVE_RECORDS: 'leave_records'
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 设置默认日期为今天
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('otDate').value = today;
            document.getElementById('leaveDate').value = today;

            // 加载数据
            refreshData();
        });

        // 获取数据
        function getData(key) {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : [];
        }

        // 保存数据
        function saveData(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        // 计算日期差（天数）
        function daysBetween(date1, date2) {
            const oneDay = 24 * 60 * 60 * 1000;
            return Math.round((date2 - date1) / oneDay);
        }

        // 计算过期日期（6个月后）
        function getExpiryDate(date) {
            const d = new Date(date);
            d.setMonth(d.getMonth() + 6);
            return d;
        }

        // 检查是否过期
        function isExpired(otDate) {
            const expiryDate = getExpiryDate(new Date(otDate));
            return new Date() > expiryDate;
        }

        // 检查是否即将过期（30天内）
        function isExpiringSoon(otDate) {
            const expiryDate = getExpiryDate(new Date(otDate));
            const daysUntilExpiry = daysBetween(new Date(), expiryDate);
            return daysUntilExpiry > 0 && daysUntilExpiry <= 30;
        }

        // 计算员工剩余假期
        function calculateRemainingDays(employeeName) {
            const otRecords = getData(STORAGE_KEYS.OT_RECORDS).filter(r => r.employee === employeeName);
            const leaveRecords = getData(STORAGE_KEYS.LEAVE_RECORDS).filter(r => r.employee === employeeName);

            let total = 0;
            let validRecords = [];

            otRecords.forEach(ot => {
                if (!isExpired(ot.date)) {
                    const used = leaveRecords
                        .filter(l => l.otRecordId === ot.id)
                        .reduce((sum, l) => sum + l.duration, 0);
                    const remaining = ot.duration - used;
                    if (remaining > 0) {
                        total += remaining;
                        validRecords.push({...ot, remaining, used});
                    }
                }
            });

            return { total, validRecords };
        }

        // 获取最近一次加班
        function getLatestOT(employeeName) {
            const otRecords = getData(STORAGE_KEYS.OT_RECORDS)
                .filter(r => r.employee === employeeName)
                .sort((a, b) => new Date(b.date) - new Date(a.date));

            if (otRecords.length === 0) return null;

            const latest = otRecords[0];
            return {
                date: latest.date,
                duration: latest.duration
            };
        }

        // 刷新显示
        function refreshData() {
            const employees = getData(STORAGE_KEYS.EMPLOYEES);
            const grid = document.getElementById('employeeGrid');
            grid.innerHTML = '';

            // 显示已有员工（最多10个）
            for (let i = 0; i < 10; i++) {
                const card = document.createElement('div');

                if (i < employees.length) {
                    const employee = employees[i];
                    const { total } = calculateRemainingDays(employee);
                    const latest = getLatestOT(employee);

                    let valueClass = 'zero';
                    if (total >= 2) valueClass = 'good';
                    else if (total > 0) valueClass = 'warning';

                    card.className = 'employee-card';
                    card.innerHTML = `
                        <div class="employee-name">${employee}</div>
                        <div class="employee-info">
                            <div class="info-label">剩余假期</div>
                            <div class="info-value ${valueClass}">${total.toFixed(1)} 天</div>
                        </div>
                        <div class="employee-info">
                            <div class="info-label">最近加班</div>
                            <div class="info-value">${latest ? `${latest.date} (${latest.duration}天)` : '暂无记录'}</div>
                        </div>
                    `;
                } else {
                    card.className = 'employee-card empty';
                    card.textContent = '空位';
                }

                grid.appendChild(card);
            }

            // 更新下拉列表
            updateEmployeeSelects();
        }

        // 更新员工下拉列表
        function updateEmployeeSelects() {
            const employees = getData(STORAGE_KEYS.EMPLOYEES);
            const selects = ['otEmployee', 'leaveEmployee'];

            selects.forEach(selectId => {
                const select = document.getElementById(selectId);
                select.innerHTML = '<option value="">请选择员工</option>';
                employees.forEach(emp => {
                    const option = document.createElement('option');
                    option.value = emp;
                    option.textContent = emp;
                    select.appendChild(option);
                });
            });
        }

        // 打开弹窗
        function openAddEmployeeModal() {
            const employees = getData(STORAGE_KEYS.EMPLOYEES);
            if (employees.length >= 10) {
                alert('已达到最大员工数量（10人）');
                return;
            }
            document.getElementById('employeeName').value = '';
            document.getElementById('addEmployeeModal').classList.add('active');
        }

        function openAddOTModal() {
            const employees = getData(STORAGE_KEYS.EMPLOYEES);
            if (employees.length === 0) {
                alert('请先添加员工');
                return;
            }
            document.getElementById('otAM').checked = false;
            document.getElementById('otPM').checked = false;
            document.getElementById('addOTModal').classList.add('active');
        }

        function openLeaveModal() {
            const employees = getData(STORAGE_KEYS.EMPLOYEES);
            if (employees.length === 0) {
                alert('请先添加员工');
                return;
            }
            document.getElementById('leaveAM').checked = false;
            document.getElementById('leavePM').checked = false;
            document.getElementById('otRecordsList').innerHTML = '';
            document.getElementById('leaveModal').classList.add('active');
        }

        // 关闭弹窗
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // 添加员工
        function addEmployee() {
            const name = document.getElementById('employeeName').value.trim();
            if (!name) {
                alert('请输入员工姓名');
                return;
            }

            const employees = getData(STORAGE_KEYS.EMPLOYEES);
            if (employees.includes(name)) {
                alert('该员工已存在');
                return;
            }

            if (employees.length >= 10) {
                alert('已达到最大员工数量（10人）');
                return;
            }

            employees.push(name);
            saveData(STORAGE_KEYS.EMPLOYEES, employees);
            closeModal('addEmployeeModal');
            refreshData();
            alert('员工添加成功！');
        }

        // 添加加班记录
        function addOT() {
            const employee = document.getElementById('otEmployee').value;
            const date = document.getElementById('otDate').value;
            const am = document.getElementById('otAM').checked;
            const pm = document.getElementById('otPM').checked;

            if (!employee) {
                alert('请选择员工');
                return;
            }
            if (!date) {
                alert('请选择加班日期');
                return;
            }
            if (!am && !pm) {
                alert('请选择加班时长');
                return;
            }

            const duration = (am ? 0.5 : 0) + (pm ? 0.5 : 0);
            const otRecords = getData(STORAGE_KEYS.OT_RECORDS);

            otRecords.push({
                id: Date.now(),
                employee,
                date,
                duration,
                periods: { am, pm }
            });

            saveData(STORAGE_KEYS.OT_RECORDS, otRecords);
            closeModal('addOTModal');
            refreshData();
            alert(`加班录入成功！\n员工：${employee}\n日期：${date}\n时长：${duration}天`);
        }

        // 加载员工加班记录
        function loadEmployeeOTRecords() {
            const employeeName = document.getElementById('leaveEmployee').value;
            const container = document.getElementById('otRecordsList');

            if (!employeeName) {
                container.innerHTML = '';
                return;
            }

            const { total, validRecords } = calculateRemainingDays(employeeName);

            if (validRecords.length === 0) {
                container.innerHTML = '<div class="no-records">该员工暂无可用加班记录</div>';
                return;
            }

            // 按到期日期排序（最快过期的在前）
            validRecords.sort((a, b) => new Date(a.date) - new Date(b.date));

            let html = `<div class="form-group">
                <label class="form-label">可用加班记录（剩余总计：${total.toFixed(1)}天）</label>`;

            validRecords.forEach(record => {
                const expiryDate = getExpiryDate(new Date(record.date));
                const daysUntilExpiry = daysBetween(new Date(), expiryDate);

                let statusClass = 'valid';
                let statusText = '有效';

                if (isExpiringSoon(record.date)) {
                    statusClass = 'expiring';
                    statusText = `${daysUntilExpiry}天后过期`;
                }

                const recordClass = statusClass === 'expiring' ? 'expiring-soon' : '';

                html += `
                    <div class="ot-record ${recordClass}">
                        <div class="ot-record-header">
                            <span class="ot-record-date">${record.date}</span>
                            <span class="ot-record-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="ot-record-info">
                            原始：${record.duration}天 | 已用：${record.used}天 | 剩余：${record.remaining}天
                        </div>
                        <div class="ot-record-info" style="font-size: 0.85em; color: #999;">
                            过期日期：${expiryDate.toLocaleDateString('zh-CN')}
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        // 申请调休
        function applyLeave() {
            const employee = document.getElementById('leaveEmployee').value;
            const date = document.getElementById('leaveDate').value;
            const am = document.getElementById('leaveAM').checked;
            const pm = document.getElementById('leavePM').checked;

            if (!employee) {
                alert('请选择员工');
                return;
            }
            if (!date) {
                alert('请选择调休日期');
                return;
            }
            if (!am && !pm) {
                alert('请选择调休时长');
                return;
            }

            const duration = (am ? 0.5 : 0) + (pm ? 0.5 : 0);
            const { total, validRecords } = calculateRemainingDays(employee);

            if (total < duration) {
                alert(`假期不足！\n需要：${duration}天\n可用：${total.toFixed(1)}天`);
                return;
            }

            // 按日期排序，优先使用最快过期的
            validRecords.sort((a, b) => new Date(a.date) - new Date(b.date));

            const leaveRecords = getData(STORAGE_KEYS.LEAVE_RECORDS);
            let remaining = duration;

            for (const record of validRecords) {
                if (remaining <= 0) break;

                const toUse = Math.min(remaining, record.remaining);
                leaveRecords.push({
                    id: Date.now() + Math.random(),
                    employee,
                    date,
                    duration: toUse,
                    otRecordId: record.id,
                    periods: { am, pm }
                });

                remaining -= toUse;
            }

            saveData(STORAGE_KEYS.LEAVE_RECORDS, leaveRecords);
            closeModal('leaveModal');
            refreshData();
            alert(`调休申请成功！\n员工：${employee}\n日期：${date}\n时长：${duration}天`);
        }

        // 清空所有数据
        function clearAllData() {
            if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) {
                return;
            }

            if (!confirm('再次确认：真的要删除所有员工、加班和调休记录吗？')) {
                return;
            }

            localStorage.removeItem(STORAGE_KEYS.EMPLOYEES);
            localStorage.removeItem(STORAGE_KEYS.OT_RECORDS);
            localStorage.removeItem(STORAGE_KEYS.LEAVE_RECORDS);

            refreshData();
            alert('所有数据已清空！');
        }

        // 点击弹窗外部关闭
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
