<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加班管理系统 - Overtime Management System</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            color: #333;
        }

        .user-email {
            font-size: 0.85em;
            color: #666;
        }

        .sheets-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .sheets-status.connected {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .sheets-status.connected:hover {
            background: #c3e6cb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(21, 87, 36, 0.3);
        }

        .sheets-status.disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
        }

        .employee-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .employee-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .employee-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .employee-card.empty {
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            min-height: 180px;
        }

        .employee-name {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .employee-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-label {
            color: #666;
            font-size: 0.9em;
        }

        .info-value {
            font-weight: 600;
            color: #333;
        }

        .remaining-days {
            font-size: 1.2em;
            padding: 5px 12px;
            border-radius: 20px;
        }

        .remaining-days.high {
            background: #d4edda;
            color: #155724;
        }

        .remaining-days.low {
            background: #f8d7da;
            color: #721c24;
        }

        .remaining-days.zero {
            background: #e2e3e5;
            color: #383d41;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
            color: white;
        }

        .btn-info {
            background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .overtime-records {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .overtime-record-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .overtime-record-item.expiring-soon {
            border-left-color: #ffc107;
            background: #fff3cd;
        }

        .overtime-record-item.expired {
            border-left-color: #dc3545;
            background: #f8d7da;
            opacity: 0.7;
        }

        .record-date {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .record-details {
            font-size: 0.9em;
            color: #666;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .login-title {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 15px;
        }

        .login-subtitle {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 15px 30px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .google-btn:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
        }

        .google-icon {
            width: 24px;
            height: 24px;
        }

        .debug-log {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85em;
            text-align: left;
        }

        .debug-log-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .log-time {
            color: #666;
            margin-right: 10px;
        }

        .log-success {
            color: #28a745;
        }

        .log-error {
            color: #dc3545;
        }

        .log-warning {
            color: #ffc107;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .employee-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .modal-content {
                padding: 20px;
            }

            .login-box {
                padding: 30px 20px;
            }

            .login-title {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h1 class="login-title">🏢 加班管理系统</h1>
            <p class="login-subtitle">
                请使用您的公司 Google 账号登录<br>
                登录后即可访问加班记录和调休管理功能
            </p>
            <button id="googleSignInBtn" class="google-btn">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                使用 Google 账号登录
            </button>
            <div class="debug-log">
                <div class="debug-log-title">调试日志</div>
                <div id="debugLog"></div>
            </div>
        </div>
    </div>

    <!-- 主应用页面 -->
    <div id="mainApp" class="container hidden">
        <div class="header">
            <h1>🏢 加班管理系统</h1>
            <div class="user-info">
                <a id="sheetsStatus" class="sheets-status disconnected" href="https://docs.google.com/spreadsheets/d/1NlbxM1z02IGOEhkHFoqoiGEb_Uo9lwaupaRZSk-kOng/edit" target="_blank">
                    ❌ 未连接 Google Sheets
                </a>
                <img id="userAvatar" class="user-avatar hidden" alt="用户头像">
                <div class="user-details hidden" id="userDetails">
                    <span class="user-name" id="userName"></span>
                    <span class="user-email" id="userEmail"></span>
                </div>
                <button class="logout-btn" onclick="handleSignOut()">退出登录</button>
            </div>
        </div>

        <div class="employee-grid" id="employeeGrid">
            <!-- 员工卡片将通过 JavaScript 动态生成 -->
        </div>

        <div class="action-buttons">
            <button class="btn btn-success" onclick="showOvertimeModal()">➕ 加班录入</button>
            <button class="btn btn-info" onclick="showLeaveModal()">🏖️ 调休申请</button>
            <button class="btn btn-danger" onclick="loadData()">🔄 刷新数据</button>
        </div>
    </div>

    <!-- 加班录入模态框 -->
    <div id="overtimeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">➕ 加班录入</div>
            <div class="form-group">
                <label class="form-label">选择员工</label>
                <select id="overtimeEmployee" class="form-control">
                    <option value="">请选择员工</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">加班日期</label>
                <input type="date" id="overtimeDate" class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">加班时段</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="overtimeAM" value="AM">
                        上半天 (AM)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="overtimePM" value="PM">
                        下半天 (PM)
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="submitOvertime()">确认录入</button>
                <button class="btn" style="background: #6c757d; color: white;" onclick="closeModal('overtimeModal')">取消</button>
            </div>
        </div>
    </div>

    <!-- 调休申请模态框 -->
    <div id="leaveModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">🏖️ 调休申请</div>
            <div class="form-group">
                <label class="form-label">选择员工</label>
                <select id="leaveEmployee" class="form-control" onchange="loadEmployeeOvertimeRecords()">
                    <option value="">请选择员工</option>
                </select>
            </div>
            <div id="overtimeRecordsContainer" class="hidden">
                <div class="form-label">可用加班记录</div>
                <div id="overtimeRecords" class="overtime-records"></div>
            </div>
            <div class="form-group">
                <label class="form-label">调休日期</label>
                <input type="date" id="leaveDate" class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">调休时段</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="leaveAM" value="AM">
                        上半天 (AM)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="leavePM" value="PM">
                        下半天 (PM)
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">备注（可选）</label>
                <input type="text" id="leaveRemark" class="form-control" placeholder="请输入调休原因或备注">
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="submitLeave()">确认申请</button>
                <button class="btn" style="background: #6c757d; color: white;" onclick="closeModal('leaveModal')">取消</button>
            </div>
        </div>
    </div>

    <script>
        // Google API 配置
        const CONFIG = {
            CLIENT_ID: 'YOUR_OAUTH_CLIENT_ID_HERE', // 需要替换为您的 OAuth 客户端 ID
            SPREADSHEET_ID: '1NlbxM1z02IGOEhkHFoqoiGEb_Uo9lwaupaRZSk-kOng',
            SCOPES: 'https://www.googleapis.com/auth/spreadsheets',
            DISCOVERY_DOCS: ['https://sheets.googleapis.com/$discovery/rest?version=v4']
        };

        // 员工列表
        const EMPLOYEES = ['Tommy', 'Cindy', 'Elaine', 'Vincent', 'Vic', 'Nick'];

        // 员工数据映射（列索引）
        const EMPLOYEE_COLUMN_MAP = {
            'Tommy': 1,   // B列
            'Cindy': 2,   // C列
            'Elaine': 3,  // D列
            'Vincent': 4, // E列
            'Vic': 5,     // F列
            'Nick': 6     // G列
        };

        // 全局变量
        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        let accessToken = null;
        let currentUser = null;
        let employeesData = {};

        // 调试日志函数
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('debugLog');
            if (!logDiv) return;

            const time = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';

            let className = '';
            if (type === 'success') className = 'log-success';
            else if (type === 'error') className = 'log-error';
            else if (type === 'warning') className = 'log-warning';

            logEntry.innerHTML = `<span class="log-time">[${time}]</span><span class="${className}">${message}</span>`;
            logDiv.appendChild(logEntry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            addLog('页面加载完成');

            // 绑定登录按钮事件
            const signInBtn = document.getElementById('googleSignInBtn');
            if (signInBtn) {
                signInBtn.addEventListener('click', handleAuthClick);
                addLog('✅ 登录按钮事件已绑定', 'success');
            } else {
                addLog('❌ 未找到登录按钮元素', 'error');
            }

            // 初始化员工选择下拉框
            initEmployeeSelects();
        });

        // GAPI 库加载回调
        function gapiLoaded() {
            addLog('正在初始化 GAPI 客户端...');
            gapi.load('client', initializeGapiClient);
        }

        // 初始化 GAPI 客户端
        async function initializeGapiClient() {
            try {
                await gapi.client.init({
                    discoveryDocs: CONFIG.DISCOVERY_DOCS,
                });
                gapiInited = true;
                addLog('✅ GAPI 客户端初始化成功', 'success');
                maybeEnableButtons();
            } catch (error) {
                addLog('❌ GAPI 初始化失败: ' + error.message, 'error');
            }
        }

        // GIS 库加载回调
        function gisLoaded() {
            addLog('正在初始化 GIS 客户端...');

            if (CONFIG.CLIENT_ID === 'YOUR_OAUTH_CLIENT_ID_HERE') {
                addLog('⚠️ 警告：请先配置 OAuth 客户端 ID！', 'warning');
                alert('请先在代码中配置 OAuth 客户端 ID（第 468 行）');
                return;
            }

            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CONFIG.CLIENT_ID,
                scope: CONFIG.SCOPES,
                callback: '', // 将在 handleAuthClick 中定义
            });
            gisInited = true;
            addLog('✅ GIS 客户端初始化成功', 'success');
            maybeEnableButtons();
        }

        // 检查是否可以启用按钮
        function maybeEnableButtons() {
            if (gapiInited && gisInited) {
                addLog('✅ 所有库已就绪，登录按钮已激活', 'success');
                document.getElementById('googleSignInBtn').disabled = false;
            } else {
                addLog('⏳ 等待库初始化完成...', 'warning');
                if (!gapiInited) addLog('  - GAPI 未就绪', 'warning');
                if (!gisInited) addLog('  - GIS 未就绪', 'warning');
            }
        }

        // 处理登录点击
        function handleAuthClick() {
            addLog('用户点击了登录按钮');

            if (!gapiInited || !gisInited) {
                addLog('❌ 库未初始化完成，请稍后再试', 'error');
                alert('系统正在初始化，请稍后再试');
                return;
            }

            addLog('请求新的 Access Token...');
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    addLog('❌ 认证失败: ' + resp.error, 'error');
                    throw (resp);
                }

                addLog('✅ 认证成功，获取用户信息...', 'success');
                accessToken = resp.access_token;
                gapi.client.setToken({access_token: accessToken});

                // 获取用户信息
                await getUserInfo();

                // 切换到主应用页面
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');

                // 加载数据
                await loadData();
            };

            if (gapi.client.getToken() === null) {
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        // 获取用户信息
        async function getUserInfo() {
            try {
                const response = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                const userInfo = await response.json();
                currentUser = userInfo;

                // 显示用户信息
                document.getElementById('userAvatar').src = userInfo.picture;
                document.getElementById('userAvatar').classList.remove('hidden');
                document.getElementById('userName').textContent = userInfo.name;
                document.getElementById('userEmail').textContent = userInfo.email;
                document.getElementById('userDetails').classList.remove('hidden');

                addLog('✅ 用户信息加载成功: ' + userInfo.name, 'success');
            } catch (error) {
                addLog('❌ 获取用户信息失败: ' + error.message, 'error');
            }
        }

        // 退出登录
        function handleSignOut() {
            const token = gapi.client.getToken();
            if (token !== null) {
                google.accounts.oauth2.revoke(token.access_token);
                gapi.client.setToken('');
            }

            accessToken = null;
            currentUser = null;
            employeesData = {};

            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');

            addLog('✅ 已退出登录', 'success');
        }

        // 初始化员工选择下拉框
        function initEmployeeSelects() {
            const overtimeSelect = document.getElementById('overtimeEmployee');
            const leaveSelect = document.getElementById('leaveEmployee');

            EMPLOYEES.forEach(emp => {
                const option1 = document.createElement('option');
                option1.value = emp;
                option1.textContent = emp;
                overtimeSelect.appendChild(option1);

                const option2 = document.createElement('option');
                option2.value = emp;
                option2.textContent = emp;
                leaveSelect.appendChild(option2);
            });
        }

        // 加载数据
        async function loadData() {
            try {
                updateSheetsStatus('connecting');

                // 读取 OT record 表的剩余假期数据（第5行：B5:G5）
                const remainingResponse = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: CONFIG.SPREADSHEET_ID,
                    range: 'OT record!B5:G5',
                });

                const remainingData = remainingResponse.result.values;
                console.log('剩余假期数据:', remainingData);

                // 读取加班记录（从第13行开始）
                const overtimeResponse = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: CONFIG.SPREADSHEET_ID,
                    range: 'OT record!A13:G200',
                });

                const overtimeData = overtimeResponse.result.values || [];
                console.log('加班记录数据:', overtimeData);

                // 处理员工数据
                employeesData = {};
                EMPLOYEES.forEach((emp, index) => {
                    // 读取剩余假期（从 B5:G5，索引0对应Tommy的B列）
                    const remainingDays = remainingData && remainingData[0] && remainingData[0][index] 
                        ? parseFloat(remainingData[0][index]) || 0 
                        : 0;

                    employeesData[emp] = {
                        name: emp,
                        remainingDays: remainingDays,
                        overtimeRecords: [],
                        lastOvertime: null
                    };

                    // 处理加班记录
                    overtimeData.forEach(row => {
                        if (row && row.length > index + 1) {
                            const cellValue = row[index + 1]; // +1 因为A列是日期
                            if (cellValue && cellValue.trim()) {
                                const date = row[0];
                                const record = {
                                    date: date,
                                    value: cellValue,
                                    periods: []
                                };

                                // 解析 AM/PM 信息
                                if (cellValue.includes('AM')) record.periods.push('AM');
                                if (cellValue.includes('PM')) record.periods.push('PM');

                                employeesData[emp].overtimeRecords.push(record);

                                // 更新最近加班
                                if (!employeesData[emp].lastOvertime || new Date(date) > new Date(employeesData[emp].lastOvertime.date)) {
                                    employeesData[emp].lastOvertime = record;
                                }
                            }
                        }
                    });
                });

                console.log('处理后的员工数据:', employeesData);

                // 渲染员工卡片
                renderEmployeeCards();

                updateSheetsStatus('connected');
                addLog('✅ 数据加载成功', 'success');
            } catch (error) {
                console.error('加载数据失败:', error);
                updateSheetsStatus('disconnected');
                addLog('❌ 数据加载失败: ' + error.message, 'error');
                alert('加载数据失败: ' + error.message);
            }
        }

        // 更新 Google Sheets 连接状态
        function updateSheetsStatus(status) {
            const statusElement = document.getElementById('sheetsStatus');
            if (status === 'connected') {
                statusElement.className = 'sheets-status connected';
                statusElement.innerHTML = '✅ 已连接 Google Sheets';
            } else if (status === 'connecting') {
                statusElement.className = 'sheets-status';
                statusElement.style.background = '#fff3cd';
                statusElement.style.color = '#856404';
                statusElement.innerHTML = '⏳ 正在连接...';
            } else {
                statusElement.className = 'sheets-status disconnected';
                statusElement.innerHTML = '❌ 未连接 Google Sheets';
            }
        }

        // 渲染员工卡片
        function renderEmployeeCards() {
            const grid = document.getElementById('employeeGrid');
            grid.innerHTML = '';

            // 渲染现有员工
            EMPLOYEES.forEach(emp => {
                const data = employeesData[emp];
                const card = document.createElement('div');
                card.className = 'employee-card';

                let remainingClass = 'zero';
                if (data.remainingDays >= 2) remainingClass = 'high';
                else if (data.remainingDays > 0) remainingClass = 'low';

                const lastOvertimeText = data.lastOvertime 
                    ? `${data.lastOvertime.date} (${data.lastOvertime.periods.join('+')})`
                    : '-';

                const totalDays = data.overtimeRecords.reduce((sum, record) => {
                    return sum + (record.periods.length * 0.5);
                }, 0);

                card.innerHTML = `
                    <div class="employee-name">${data.name}</div>
                    <div class="employee-info">
                        <div class="info-row">
                            <span class="info-label">剩余假期</span>
                            <span class="remaining-days ${remainingClass}">${data.remainingDays} 天</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">最近加班</span>
                            <span class="info-value">${lastOvertimeText}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">加班时长</span>
                            <span class="info-value">${totalDays} 天</span>
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });

            // 填充空卡片至10个
            const emptyCount = 10 - EMPLOYEES.length;
            for (let i = 0; i < emptyCount; i++) {
                const emptyCard = document.createElement('div');
                emptyCard.className = 'employee-card empty';
                emptyCard.textContent = '空位';
                grid.appendChild(emptyCard);
            }
        }

        // 显示加班录入模态框
        function showOvertimeModal() {
            document.getElementById('overtimeModal').classList.add('active');
            // 设置默认日期为今天
            document.getElementById('overtimeDate').valueAsDate = new Date();
        }

        // 显示调休申请模态框
        function showLeaveModal() {
            document.getElementById('leaveModal').classList.add('active');
            document.getElementById('leaveDate').valueAsDate = new Date();
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');

            // 清空表单
            if (modalId === 'overtimeModal') {
                document.getElementById('overtimeEmployee').value = '';
                document.getElementById('overtimeDate').value = '';
                document.getElementById('overtimeAM').checked = false;
                document.getElementById('overtimePM').checked = false;
            } else if (modalId === 'leaveModal') {
                document.getElementById('leaveEmployee').value = '';
                document.getElementById('leaveDate').value = '';
                document.getElementById('leaveAM').checked = false;
                document.getElementById('leavePM').checked = false;
                document.getElementById('leaveRemark').value = '';
                document.getElementById('overtimeRecordsContainer').classList.add('hidden');
            }
        }

        // 检查重复加班
        async function checkDuplicateOvertime(employee, date, periods) {
            try {
                // 读取该员工的所有加班记录
                const response = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: CONFIG.SPREADSHEET_ID,
                    range: 'OT record!A13:G200',
                });

                const data = response.result.values || [];
                const columnIndex = EMPLOYEE_COLUMN_MAP[employee];

                // 检查是否存在相同日期和时段的记录
                for (let row of data) {
                    if (row[0] === date && row[columnIndex]) {
                        const existingValue = row[columnIndex];

                        // 检查每个时段是否重复
                        for (let period of periods) {
                            if (existingValue.includes(period)) {
                                return {
                                    isDuplicate: true,
                                    period: period,
                                    existingRecord: existingValue
                                };
                            }
                        }
                    }
                }

                return { isDuplicate: false };
            } catch (error) {
                console.error('检查重复加班失败:', error);
                throw error;
            }
        }

        // 提交加班记录
        async function submitOvertime() {
            const employee = document.getElementById('overtimeEmployee').value;
            const date = document.getElementById('overtimeDate').value;
            const amChecked = document.getElementById('overtimeAM').checked;
            const pmChecked = document.getElementById('overtimePM').checked;

            // 验证输入
            if (!employee) {
                alert('请选择员工');
                return;
            }

            if (!date) {
                alert('请选择加班日期');
                return;
            }

            if (!amChecked && !pmChecked) {
                alert('请至少选择一个时段');
                return;
            }

            try {
                // 格式化日期为 YYYY/M/D 格式（与 Google Sheets 中的格式一致）
                const dateObj = new Date(date);
                const formattedDate = `${dateObj.getFullYear()}/${dateObj.getMonth() + 1}/${dateObj.getDate()}`;

                // 构建时段数组
                const periods = [];
                if (amChecked) periods.push('AM');
                if (pmChecked) periods.push('PM');

                // 检查重复加班
                const duplicateCheck = await checkDuplicateOvertime(employee, formattedDate, periods);
                if (duplicateCheck.isDuplicate) {
                    alert(`该员工在 ${formattedDate} 的 ${duplicateCheck.period} 时段已有加班记录！
现有记录：${duplicateCheck.existingRecord}`);
                    return;
                }

                // 构建单元格值（格式：AM2025/5/20 或 PM2025/5/20 或 AM2025/5/20
PM2025/5/20）
                const cellValue = periods.map(p => `${p}${formattedDate}`).join('
');

                // 查找要写入的行（找到第一个空行或追加新行）
                const response = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: CONFIG.SPREADSHEET_ID,
                    range: 'OT record!A13:A200',
                });

                const existingDates = response.result.values || [];
                let targetRow = 13 + existingDates.length; // 第一个空行

                // 检查是否已存在该日期
                let dateRowIndex = -1;
                for (let i = 0; i < existingDates.length; i++) {
                    if (existingDates[i][0] === formattedDate) {
                        dateRowIndex = i;
                        break;
                    }
                }

                const columnIndex = EMPLOYEE_COLUMN_MAP[employee];
                const columnLetter = String.fromCharCode(65 + columnIndex); // A=65

                if (dateRowIndex >= 0) {
                    // 日期已存在，更新该行的员工列
                    targetRow = 13 + dateRowIndex;

                    // 读取该行该列的现有值
                    const existingResponse = await gapi.client.sheets.spreadsheets.values.get({
                        spreadsheetId: CONFIG.SPREADSHEET_ID,
                        range: `OT record!${columnLetter}${targetRow}`,
                    });

                    let existingValue = '';
                    if (existingResponse.result.values && existingResponse.result.values[0]) {
                        existingValue = existingResponse.result.values[0][0] || '';
                    }

                    // 合并新旧值
                    const finalValue = existingValue ? `${existingValue}
${cellValue}` : cellValue;

                    await gapi.client.sheets.spreadsheets.values.update({
                        spreadsheetId: CONFIG.SPREADSHEET_ID,
                        range: `OT record!${columnLetter}${targetRow}`,
                        valueInputOption: 'USER_ENTERED',
                        resource: {
                            values: [[finalValue]]
                        }
                    });
                } else {
                    // 新日期，写入新行
                    await gapi.client.sheets.spreadsheets.values.update({
                        spreadsheetId: CONFIG.SPREADSHEET_ID,
                        range: `OT record!A${targetRow}:${columnLetter}${targetRow}`,
                        valueInputOption: 'USER_ENTERED',
                        resource: {
                            values: [[
                                formattedDate,
                                ...Array(columnIndex - 1).fill(''),
                                cellValue
                            ]]
                        }
                    });
                }

                alert('加班记录已成功提交！');
                closeModal('overtimeModal');
                await loadData(); // 重新加载数据
            } catch (error) {
                console.error('提交加班记录失败:', error);
                alert('提交失败: ' + error.message);
            }
        }

        // 加载员工的加班记录（用于调休）
        async function loadEmployeeOvertimeRecords() {
            const employee = document.getElementById('leaveEmployee').value;

            if (!employee) {
                document.getElementById('overtimeRecordsContainer').classList.add('hidden');
                return;
            }

            const data = employeesData[employee];
            const recordsDiv = document.getElementById('overtimeRecords');
            recordsDiv.innerHTML = '';

            if (!data || !data.overtimeRecords || data.overtimeRecords.length === 0) {
                recordsDiv.innerHTML = '<p style="color: #666; text-align: center;">暂无加班记录</p>';
                document.getElementById('overtimeRecordsContainer').classList.remove('hidden');
                return;
            }

            // 计算每条记录的过期状态
            const today = new Date();
            const sixMonthsAgo = new Date(today);
            sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);

            data.overtimeRecords.forEach(record => {
                const recordDate = new Date(record.date);
                const expiryDate = new Date(recordDate);
                expiryDate.setMonth(expiryDate.getMonth() + 6);

                const daysUntilExpiry = Math.floor((expiryDate - today) / (1000 * 60 * 60 * 24));

                let className = 'overtime-record-item';
                let statusText = '有效';

                if (daysUntilExpiry < 0) {
                    className += ' expired';
                    statusText = '已过期';
                } else if (daysUntilExpiry <= 30) {
                    className += ' expiring-soon';
                    statusText = `${daysUntilExpiry}天后过期`;
                }

                const days = record.periods.length * 0.5;

                const recordItem = document.createElement('div');
                recordItem.className = className;
                recordItem.innerHTML = `
                    <div class="record-date">${record.date} - ${record.periods.join(' + ')}</div>
                    <div class="record-details">
                        <span>原始: ${days} 天</span>
                        <span>状态: ${statusText}</span>
                        <span>到期: ${expiryDate.toLocaleDateString()}</span>
                    </div>
                `;

                recordsDiv.appendChild(recordItem);
            });

            document.getElementById('overtimeRecordsContainer').classList.remove('hidden');
        }

        // 提交调休申请
        async function submitLeave() {
            const employee = document.getElementById('leaveEmployee').value;
            const date = document.getElementById('leaveDate').value;
            const amChecked = document.getElementById('leaveAM').checked;
            const pmChecked = document.getElementById('leavePM').checked;
            const remark = document.getElementById('leaveRemark').value;

            // 验证输入
            if (!employee) {
                alert('请选择员工');
                return;
            }

            if (!date) {
                alert('请选择调休日期');
                return;
            }

            if (!amChecked && !pmChecked) {
                alert('请至少选择一个时段');
                return;
            }

            // 计算调休时长
            let leaveDays = 0;
            if (amChecked) leaveDays += 0.5;
            if (pmChecked) leaveDays += 0.5;

            // 检查剩余假期是否足够
            const employeeData = employeesData[employee];
            if (!employeeData || employeeData.remainingDays < leaveDays) {
                alert(`调休时长不够！
当前剩余假期：${employeeData ? employeeData.remainingDays : 0} 天
申请调休：${leaveDays} 天`);
                return;
            }

            try {
                // 格式化日期为 M/D/YYYY 格式（与 Compensatory time off 表格式一致）
                const dateObj = new Date(date);
                const formattedDate = `${dateObj.getMonth() + 1}/${dateObj.getDate()}/${dateObj.getFullYear()}`;

                // 构建时段值
                const periods = [];
                if (amChecked) periods.push('AM');
                if (pmChecked) periods.push('PM');
                const periodValue = periods.join('
');

                // 查找要写入的行
                const response = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: CONFIG.SPREADSHEET_ID,
                    range: 'Compensatory time off!A167:A500',
                });

                const existingDates = response.result.values || [];
                const targetRow = 167 + existingDates.length;

                const columnIndex = EMPLOYEE_COLUMN_MAP[employee];
                const columnLetter = String.fromCharCode(65 + columnIndex);
                const remarkColumnLetter = String.fromCharCode(65 + columnIndex + 1);

                // 写入调休记录
                await gapi.client.sheets.spreadsheets.values.update({
                    spreadsheetId: CONFIG.SPREADSHEET_ID,
                    range: `Compensatory time off!A${targetRow}:${remarkColumnLetter}${targetRow}`,
                    valueInputOption: 'USER_ENTERED',
                    resource: {
                        values: [[
                            formattedDate,
                            ...Array(columnIndex - 1).fill(''),
                            periodValue,
                            remark || ''
                        ]]
                    }
                });

                alert('调休申请已成功提交！');
                closeModal('leaveModal');
                await loadData(); // 重新加载数据
            } catch (error) {
                console.error('提交调休申请失败:', error);
                alert('提交失败: ' + error.message);
            }
        }

        // 加载 GAPI 和 GIS 库
        window.addEventListener('load', () => {
            // 检查 GAPI 是否加载
            if (typeof gapi !== 'undefined') {
                addLog('✅ GAPI 库加载成功', 'success');
                gapiLoaded();
            } else {
                addLog('⏳ 等待 GAPI 库加载...', 'warning');
                const checkGapi = setInterval(() => {
                    if (typeof gapi !== 'undefined') {
                        clearInterval(checkGapi);
                        addLog('✅ GAPI 库加载成功', 'success');
                        gapiLoaded();
                    }
                }, 100);
            }

            // 检查 GIS 是否加载
            if (typeof google !== 'undefined' && google.accounts) {
                addLog('✅ GIS 库加载成功', 'success');
                gisLoaded();
            } else {
                addLog('⏳ 等待 GIS 库加载...', 'warning');
                const checkGis = setInterval(() => {
                    if (typeof google !== 'undefined' && google.accounts) {
                        clearInterval(checkGis);
                        addLog('✅ GIS 库加载成功', 'success');
                        gisLoaded();
                    }
                }, 100);
            }
        });
    </script>
