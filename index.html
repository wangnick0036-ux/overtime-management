<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加班管理系统 - Google Sheets 集成版</title>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部样式 */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            font-weight: 700;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .status-connected {
            background: #d4edda;
            color: #155724;
        }

        .status-disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        .status-loading {
            background: #fff3cd;
            color: #856404;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #667eea;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            color: #333;
        }

        .user-email {
            font-size: 12px;
            color: #666;
        }

        /* 登录页面样式 */
        .login-container {
            max-width: 500px;
            margin: 100px auto;
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-container h2 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .login-container p {
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .google-signin-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 32px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .google-signin-btn:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
            border-color: #667eea;
        }

        .google-signin-btn:active {
            transform: translateY(0);
        }

        .google-icon {
            width: 24px;
            height: 24px;
        }

        /* 调试日志样式 */
        .debug-log {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
        }

        .debug-log h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .debug-log-entry {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 4px 0;
            color: #333;
        }

        .debug-log-entry.success {
            color: #28a745;
        }

        .debug-log-entry.error {
            color: #dc3545;
        }

        .debug-log-entry.warning {
            color: #ffc107;
        }

        /* 员工卡片网格 */
        .employee-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .employee-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .employee-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .employee-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .employee-name {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }

        .employee-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-label {
            color: #666;
            font-size: 14px;
        }

        .info-value {
            font-weight: 600;
            font-size: 16px;
        }

        .days-remaining {
            color: #28a745;
        }

        .days-low {
            color: #dc3545;
        }

        .days-none {
            color: #999;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .btn {
            flex: 1;
            min-width: 200px;
            padding: 18px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
        }

        .btn-info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #a8a8a8 0%, #6c6c6c 100%);
        }

        .btn-logout {
            padding: 10px 20px;
            font-size: 14px;
            min-width: auto;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            position: relative;
            background: white;
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 32px;
            color: #999;
            cursor: pointer;
            transition: color 0.3s ease;
            line-height: 1;
        }

        .close-btn:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 15px;
            color: #333;
        }

        .checkbox-label input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .overtime-records {
            max-height: 300px;
            overflow-y: auto;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .overtime-record {
            padding: 12px;
            margin-bottom: 10px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .overtime-record.expired {
            border-left-color: #dc3545;
            opacity: 0.6;
        }

        .overtime-record.expiring-soon {
            border-left-color: #ffc107;
        }

        .record-date {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .record-info {
            font-size: 13px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .employee-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                min-width: 100%;
            }

            .modal-content {
                margin: 20px;
                padding: 25px;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="login-container">
        <h2>🎯 加班管理系统</h2>
        <p>请使用您的公司 Google 账号登录以访问系统</p>

        <button id="googleSignInBtn" class="google-signin-btn">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            使用 Google 账号登录
        </button>

        <!-- 调试日志 -->
        <div class="debug-log">
            <h3>📋 调试日志</h3>
            <div id="debugLog"></div>
        </div>
    </div>

    <!-- 主应用页面 -->
    <div id="mainApp" class="container hidden">
        <!-- 头部 -->
        <div class="header">
            <h1>🎯 加班管理系统</h1>
            <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                <div id="connectionStatus" class="connection-status status-loading">
                    <span>⏳ 正在连接...</span>
                </div>
                <div id="userInfo" class="user-info hidden">
                    <img id="userAvatar" class="user-avatar" src="" alt="用户头像">
                    <div class="user-details">
                        <div id="userName" class="user-name"></div>
                        <div id="userEmail" class="user-email"></div>
                    </div>
                    <button id="logoutBtn" class="btn btn-secondary btn-logout">退出登录</button>
                </div>
            </div>
        </div>

        <!-- 员工卡片 -->
        <div id="employeeGrid" class="employee-grid">
            <!-- 动态生成 -->
        </div>

        <!-- 操作按钮 -->
        <div class="button-group">
            <button class="btn btn-success" onclick="showOvertimeModal()">➕ 加班录入</button>
            <button class="btn btn-info" onclick="showLeaveModal()">🏖️ 调休申请</button>
            <button class="btn btn-warning" onclick="refreshData()">🔄 刷新数据</button>
        </div>
    </div>

    <!-- 加班录入模态框 -->
    <div id="overtimeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">➕ 加班录入</h2>
                <button class="close-btn" onclick="closeModal('overtimeModal')">&times;</button>
            </div>
            <form id="overtimeForm">
                <div class="form-group">
                    <label class="form-label">选择员工</label>
                    <select id="overtimeEmployee" class="form-select" required>
                        <option value="">请选择员工</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">加班日期</label>
                    <input type="date" id="overtimeDate" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">加班时段</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="overtimeAM" value="AM">
                            上半天 (AM)
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="overtimePM" value="PM">
                            下半天 (PM)
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">确认录入</button>
            </form>
        </div>
    </div>

    <!-- 调休申请模态框 -->
    <div id="leaveModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">🏖️ 调休申请</h2>
                <button class="close-btn" onclick="closeModal('leaveModal')">&times;</button>
            </div>
            <form id="leaveForm">
                <div class="form-group">
                    <label class="form-label">选择员工</label>
                    <select id="leaveEmployee" class="form-select" required onchange="loadEmployeeOvertimeRecords()">
                        <option value="">请选择员工</option>
                    </select>
                </div>

                <div id="overtimeRecordsSection" class="hidden">
                    <div class="form-group">
                        <label class="form-label">该员工的加班记录</label>
                        <div id="overtimeRecordsList" class="overtime-records">
                            <!-- 动态生成 -->
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">调休日期</label>
                        <input type="date" id="leaveDate" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">调休时段</label>
                        <div class="checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="leaveAM" value="AM">
                                上半天 (AM)
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="leavePM" value="PM">
                                下半天 (PM)
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">备注（可选）</label>
                        <input type="text" id="leaveRemark" class="form-input" placeholder="请输入备注信息">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">确认申请</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            SPREADSHEET_ID: '1NlbxM1z02IGOEhkHFoqoiGEb_Uo9lwaupaRZSk-kOng',
            CLIENT_ID: 'YOUR_OAUTH_CLIENT_ID_HERE', // 需要替换为您的 OAuth 客户端 ID
            SCOPES: 'https://www.googleapis.com/auth/spreadsheets',
            DISCOVERY_DOC: 'https://sheets.googleapis.com/$discovery/rest?version=v4',

            // Sheet 名称
            SHEETS: {
                OT_RECORD: 'OT record',
                COMPENSATORY: 'Compensatory time off'
            },

            // 员工列映射（B-G列对应6位员工）
            EMPLOYEES: [
                { name: 'Tommy', column: 'B' },
                { name: 'Cindy', column: 'D' },
                { name: 'Elaine', column: 'F' },
                { name: 'Vincent', column: 'H' },
                { name: 'Vic', column: 'J' },
                { name: 'Nick', column: 'L' }
            ]
        };

        // ==================== 全局变量 ====================
        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        let accessToken = null;
        let employeeData = [];

        // ==================== 调试日志 ====================
        function addDebugLog(message, type = 'info') {
            const logDiv = document.getElementById('debugLog');
            if (!logDiv) return;

            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `debug-log-entry ${type}`;
            entry.textContent = `[${time}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;

            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            addDebugLog('页面加载完成', 'info');

            // 检查客户端 ID 配置
            if (CONFIG.CLIENT_ID === 'YOUR_OAUTH_CLIENT_ID_HERE') {
                addDebugLog('⚠️ 警告：请先配置 OAuth 客户端 ID！', 'warning');
                alert('请先在代码中配置您的 OAuth 客户端 ID（第468行）');
            }

            // 绑定登录按钮
            const loginBtn = document.getElementById('googleSignInBtn');
            if (loginBtn) {
                loginBtn.addEventListener('click', handleAuthClick);
                addDebugLog('✅ 登录按钮事件已绑定', 'success');
            } else {
                addDebugLog('❌ 未找到登录按钮元素', 'error');
            }

            // 绑定退出按钮
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', handleSignoutClick);
            }

            // 绑定表单提交
            document.getElementById('overtimeForm').addEventListener('submit', handleOvertimeSubmit);
            document.getElementById('leaveForm').addEventListener('submit', handleLeaveSubmit);

            // 加载 GAPI 和 GIS
            loadGoogleAPIs();
        });

        // ==================== 加载 Google APIs ====================
        function loadGoogleAPIs() {
            addDebugLog('开始加载 Google APIs...', 'info');

            // 加载 GAPI
            if (typeof gapi !== 'undefined') {
                addDebugLog('✅ GAPI 库加载成功', 'success');
                gapiLoaded();
            } else {
                addDebugLog('❌ GAPI 库加载失败', 'error');
            }

            // 加载 GIS
            if (typeof google !== 'undefined' && google.accounts) {
                addDebugLog('✅ GIS 库加载成功', 'success');
                gisLoaded();
            } else {
                addDebugLog('❌ GIS 库加载失败', 'error');
            }
        }

        function gapiLoaded() {
            addDebugLog('正在初始化 GAPI 客户端...', 'info');
            gapi.load('client', async () => {
                try {
                    await gapi.client.init({
                        discoveryDocs: [CONFIG.DISCOVERY_DOC],
                    });
                    gapiInited = true;
                    addDebugLog('✅ GAPI 客户端初始化成功', 'success');
                    maybeEnableButtons();
                } catch (error) {
                    addDebugLog(`❌ GAPI 初始化失败: ${error.message}`, 'error');
                }
            });
        }

        function gisLoaded() {
            addDebugLog('正在初始化 GIS 客户端...', 'info');
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CONFIG.CLIENT_ID,
                    scope: CONFIG.SCOPES,
                    callback: '', // 稍后定义
                });
                gisInited = true;
                addDebugLog('✅ GIS 客户端初始化成功', 'success');
                maybeEnableButtons();
            } catch (error) {
                addDebugLog(`❌ GIS 初始化失败: ${error.message}`, 'error');
            }
        }

        function maybeEnableButtons() {
            if (gapiInited && gisInited) {
                addDebugLog('✅ 所有库已就绪，登录按钮已激活', 'success');
                document.getElementById('googleSignInBtn').disabled = false;
            }
        }

        // ==================== 认证处理 ====================
        function handleAuthClick() {
            addDebugLog('用户点击了登录按钮', 'info');

            if (!gapiInited || !gisInited) {
                addDebugLog('❌ 库未初始化完成', 'error');
                alert('系统正在初始化，请稍后再试');
                return;
            }

            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    addDebugLog(`❌ 认证失败: ${resp.error}`, 'error');
                    throw (resp);
                }

                addDebugLog('✅ 认证成功，获取 Access Token', 'success');
                accessToken = gapi.client.getToken().access_token;

                // 获取用户信息
                await getUserInfo();

                // 切换到主应用
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');

                // 加载数据
                await loadData();
            };

            if (gapi.client.getToken() === null) {
                addDebugLog('请求新的 Access Token...', 'info');
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                addDebugLog('请求新的 Access Token（静默）...', 'info');
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        function handleSignoutClick() {
            const token = gapi.client.getToken();
            if (token !== null) {
                google.accounts.oauth2.revoke(token.access_token);
                gapi.client.setToken('');
                accessToken = null;
            }

            // 切换回登录页面
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('userInfo').classList.add('hidden');

            addDebugLog('✅ 已退出登录', 'success');
        }

        // ==================== 获取用户信息 ====================
        async function getUserInfo() {
            try {
                const response = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                const userInfo = await response.json();

                document.getElementById('userName').textContent = userInfo.name;
                document.getElementById('userEmail').textContent = userInfo.email;
                document.getElementById('userAvatar').src = userInfo.picture;
                document.getElementById('userInfo').classList.remove('hidden');

                addDebugLog(`✅ 用户信息加载成功: ${userInfo.name}`, 'success');
            } catch (error) {
                addDebugLog(`❌ 获取用户信息失败: ${error.message}`, 'error');
            }
        }

        // ==================== 数据加载 ====================
        async function loadData() {
            try {
                updateConnectionStatus('loading', '正在加载数据...');

                // 读取 OT record 表的剩余天数（第5行）
                const remainingResponse = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: CONFIG.SPREADSHEET_ID,
                    range: `'${CONFIG.SHEETS.OT_RECORD}'!B5:G5`,
                });

                const remainingDays = remainingResponse.result.values ? remainingResponse.result.values[0] : [];

                // 读取加班记录（从第13行开始）
                const recordsResponse = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: CONFIG.SPREADSHEET_ID,
                    range: `'${CONFIG.SHEETS.OT_RECORD}'!A13:G200`,
                });

                const records = recordsResponse.result.values || [];

                // 处理员工数据
                employeeData = CONFIG.EMPLOYEES.map((emp, index) => {
                    const remaining = parseFloat(remainingDays[index * 2] || 0);
                    const employeeRecords = extractEmployeeRecords(records, index);

                    return {
                        name: emp.name,
                        column: emp.column,
                        remainingDays: remaining,
                        latestOvertime: getLatestOvertime(employeeRecords),
                        overtimeRecords: employeeRecords
                    };
                });

                renderEmployeeCards();
                populateEmployeeSelects();
                updateConnectionStatus('connected', '已连接 Google Sheets');

            } catch (error) {
                console.error('加载数据失败:', error);
                updateConnectionStatus('disconnected', '连接失败');
                alert('加载数据失败: ' + error.message);
            }
        }

        function extractEmployeeRecords(records, employeeIndex) {
            const columnIndex = employeeIndex * 2 + 1; // B=1, D=3, F=5, H=7, J=9, L=11
            const result = [];

            records.forEach(row => {
                if (row[0] && row[columnIndex]) {
                    const date = row[0];
                    const value = row[columnIndex];

                    // 解析 AM/PM 记录
                    if (value.includes('AM') || value.includes('PM')) {
                        const parts = value.match(/(AM|PM)(\d{4}\/\d{1,2}\/\d{1,2})/g);
                        if (parts) {
                            parts.forEach(part => {
                                const period = part.substring(0, 2);
                                const overtimeDate = part.substring(2);
                                result.push({
                                    date: overtimeDate,
                                    period: period,
                                    duration: 0.5
                                });
                            });
                        }
                    }
                }
            });

            return result;
        }

        function getLatestOvertime(records) {
            if (records.length === 0) return { date: '-', duration: 0 };

            // 按日期排序，取最新的
            const sorted = records.sort((a, b) => new Date(b.date) - new Date(a.date));
            const latest = sorted[0];

            // 计算同一天的总时长
            const sameDay = records.filter(r => r.date === latest.date);
            const totalDuration = sameDay.reduce((sum, r) => sum + r.duration, 0);

            return {
                date: latest.date,
                duration: totalDuration
            };
        }

        // ==================== UI 渲染 ====================
        function renderEmployeeCards() {
            const grid = document.getElementById('employeeGrid');
            grid.innerHTML = '';

            employeeData.forEach(emp => {
                const card = document.createElement('div');
                card.className = 'employee-card';

                let daysClass = 'days-none';
                if (emp.remainingDays >= 2) daysClass = 'days-remaining';
                else if (emp.remainingDays > 0) daysClass = 'days-low';

                card.innerHTML = `
                    <div class="employee-name">${emp.name}</div>
                    <div class="employee-info">
                        <div class="info-row">
                            <span class="info-label">剩余假期</span>
                            <span class="info-value ${daysClass}">${emp.remainingDays} 天</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">最近加班</span>
                            <span class="info-value">${emp.latestOvertime.date}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">加班时长</span>
                            <span class="info-value">${emp.latestOvertime.duration} 天</span>
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function populateEmployeeSelects() {
            const overtimeSelect = document.getElementById('overtimeEmployee');
            const leaveSelect = document.getElementById('leaveEmployee');

            [overtimeSelect, leaveSelect].forEach(select => {
                select.innerHTML = '<option value="">请选择员工</option>';
                employeeData.forEach((emp, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = emp.name;
                    select.appendChild(option);
                });
            });
        }

        function updateConnectionStatus(status, message) {
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.className = 'connection-status';

            if (status === 'connected') {
                statusDiv.classList.add('status-connected');
                statusDiv.innerHTML = '<span>✅ ' + message + '</span>';
            } else if (status === 'disconnected') {
                statusDiv.classList.add('status-disconnected');
                statusDiv.innerHTML = '<span>❌ ' + message + '</span>';
            } else {
                statusDiv.classList.add('status-loading');
                statusDiv.innerHTML = '<span>⏳ ' + message + '</span>';
            }
        }

        // ==================== 模态框控制 ====================
        function showOvertimeModal() {
            document.getElementById('overtimeModal').style.display = 'block';
            document.getElementById('overtimeDate').valueAsDate = new Date();
        }

        function showLeaveModal() {
            document.getElementById('leaveModal').style.display = 'block';
            document.getElementById('leaveDate').valueAsDate = new Date();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';

            // 重置表单
            if (modalId === 'overtimeModal') {
                document.getElementById('overtimeForm').reset();
            } else if (modalId === 'leaveModal') {
                document.getElementById('leaveForm').reset();
                document.getElementById('overtimeRecordsSection').classList.add('hidden');
            }
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }

        // ==================== 加载员工加班记录 ====================
        function loadEmployeeOvertimeRecords() {
            const employeeIndex = document.getElementById('leaveEmployee').value;
            if (!employeeIndex) {
                document.getElementById('overtimeRecordsSection').classList.add('hidden');
                return;
            }

            const employee = employeeData[employeeIndex];
            const recordsList = document.getElementById('overtimeRecordsList');

            if (employee.overtimeRecords.length === 0) {
                recordsList.innerHTML = '<div class="empty-state">该员工暂无加班记录</div>';
            } else {
                recordsList.innerHTML = '';

                employee.overtimeRecords.forEach(record => {
                    const recordDiv = document.createElement('div');
                    const overtimeDate = new Date(record.date);
                    const expiryDate = new Date(overtimeDate);
                    expiryDate.setMonth(expiryDate.getMonth() + 6);

                    const today = new Date();
                    const daysUntilExpiry = Math.floor((expiryDate - today) / (1000 * 60 * 60 * 24));

                    let className = 'overtime-record';
                    let statusText = '';

                    if (daysUntilExpiry < 0) {
                        className += ' expired';
                        statusText = '已过期';
                    } else if (daysUntilExpiry < 30) {
                        className += ' expiring-soon';
                        statusText = `${daysUntilExpiry} 天后过期`;
                    } else {
                        statusText = `${daysUntilExpiry} 天后过期`;
                    }

                    recordDiv.className = className;
                    recordDiv.innerHTML = `
                        <div class="record-date">${record.date} (${record.period})</div>
                        <div class="record-info">时长: ${record.duration} 天 | ${statusText} | 到期日: ${expiryDate.toLocaleDateString()}</div>
                    `;

                    recordsList.appendChild(recordDiv);
                });
            }

            document.getElementById('overtimeRecordsSection').classList.remove('hidden');
        }

        // ==================== 表单提交处理 ====================
        async function handleOvertimeSubmit(e) {
            e.preventDefault();

            const employeeIndex = document.getElementById('overtimeEmployee').value;
            const date = document.getElementById('overtimeDate').value;
            const isAM = document.getElementById('overtimeAM').checked;
            const isPM = document.getElementById('overtimePM').checked;

            if (!isAM && !isPM) {
                alert('请至少选择一个时段');
                return;
            }

            try {
                const employee = employeeData[employeeIndex];

                // 格式化日期为 YYYY/M/D
                const dateObj = new Date(date);
                const formattedDate = `${dateObj.getFullYear()}/${dateObj.getMonth() + 1}/${dateObj.getDate()}`;

                // 构建记录值
                let recordValue = '';
                if (isAM) recordValue += `AM${formattedDate}`;
                if (isPM) recordValue += (recordValue ? '
' : '') + `PM${formattedDate}`;

                // 找到第一个空行
                const response = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: CONFIG.SPREADSHEET_ID,
                    range: `'${CONFIG.SHEETS.OT_RECORD}'!A13:A200`,
                });

                const existingDates = response.result.values || [];
                const nextRow = 13 + existingDates.length;

                // 写入数据
                await gapi.client.sheets.spreadsheets.values.update({
                    spreadsheetId: CONFIG.SPREADSHEET_ID,
                    range: `'${CONFIG.SHEETS.OT_RECORD}'!A${nextRow}:${employee.column}${nextRow}`,
                    valueInputOption: 'USER_ENTERED',
                    resource: {
                        values: [[formattedDate, ...(employee.column === 'B' ? [recordValue] : 
                                Array(parseInt(employee.column.charCodeAt(0) - 66)).fill('').concat([recordValue]))]]
                    }
                });

                alert('加班记录已成功录入！');
                closeModal('overtimeModal');
                await loadData();

            } catch (error) {
                console.error('录入失败:', error);
                alert('录入失败: ' + error.message);
            }
        }

        async function handleLeaveSubmit(e) {
            e.preventDefault();

            const employeeIndex = document.getElementById('leaveEmployee').value;
            const date = document.getElementById('leaveDate').value;
            const isAM = document.getElementById('leaveAM').checked;
            const isPM = document.getElementById('leavePM').checked;
            const remark = document.getElementById('leaveRemark').value;

            if (!isAM && !isPM) {
                alert('请至少选择一个时段');
                return;
            }

            const leaveDays = (isAM ? 0.5 : 0) + (isPM ? 0.5 : 0);
            const employee = employeeData[employeeIndex];

            if (employee.remainingDays < leaveDays) {
                alert(`假期余额不足！当前剩余: ${employee.remainingDays} 天`);
                return;
            }

            try {
                // 格式化日期为 M/D/YYYY
                const dateObj = new Date(date);
                const formattedDate = `${dateObj.getMonth() + 1}/${dateObj.getDate()}/${dateObj.getFullYear()}`;

                // 构建时段值
                let periodValue = '';
                if (isAM) periodValue += 'AM';
                if (isPM) periodValue += (periodValue ? '
' : '') + 'PM';

                // 找到第一个空行
                const response = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: CONFIG.SPREADSHEET_ID,
                    range: `'${CONFIG.SHEETS.COMPENSATORY}'!A1:A200`,
                });

                const existingDates = response.result.values || [];
                const nextRow = existingDates.length + 1;

                // 准备写入的数据
                const columnOffset = parseInt(employee.column.charCodeAt(0) - 66);
                const rowData = [formattedDate];

                // 填充到对应列
                for (let i = 0; i < columnOffset; i++) {
                    rowData.push('');
                }
                rowData.push(periodValue);
                rowData.push(remark || '');

                // 写入数据
                await gapi.client.sheets.spreadsheets.values.update({
                    spreadsheetId: CONFIG.SPREADSHEET_ID,
                    range: `'${CONFIG.SHEETS.COMPENSATORY}'!A${nextRow}`,
                    valueInputOption: 'USER_ENTERED',
                    resource: {
                        values: [rowData]
                    }
                });

                alert('调休申请已成功提交！');
                closeModal('leaveModal');
                await loadData();

            } catch (error) {
                console.error('提交失败:', error);
                alert('提交失败: ' + error.message);
            }
        }

        // ==================== 刷新数据 ====================
        async function refreshData() {
            await loadData();
            alert('数据已刷新！');
        }
    </script>
</body>
</html>
